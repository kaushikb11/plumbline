name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: ruff + mypy --strict + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: mypy --strict
        run: mypy --strict

      - name: pytest
        run: pytest
