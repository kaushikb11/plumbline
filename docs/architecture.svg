<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Plumbline data flow: capture the four seams to a trace, then faithful and counterfactual replay feed reproduce/diff, the regression gate, and fidelity metrics.">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a94a6"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="888" height="328" rx="16" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="30" y="40" font-size="17" font-weight="700" fill="#1f2328">How Plumbline works</text>
  <text x="30" y="60" font-size="12.5" fill="#57606a">Capture the four language seams to a trace, then replay it — faithfully, or with one seam swapped.</text>

  <!-- edges (drawn first, under the boxes) -->
  <g fill="none" stroke="#8a94a6" stroke-width="1.6">
    <path d="M186 150 H232" marker-end="url(#arw)"/>
    <path d="M392 150 C 418 150 414 108 440 108" marker-end="url(#arw)"/>
    <path d="M392 150 C 418 150 414 240 440 240" marker-end="url(#arw)"/>
    <path d="M636 108 C 662 108 664 96 690 96" marker-end="url(#arw)"/>
    <path d="M636 232 C 662 232 664 190 690 190" marker-end="url(#arw)"/>
    <path d="M636 248 C 662 248 664 276 690 276" marker-end="url(#arw)"/>
  </g>

  <!-- 1. Capture -->
  <g>
    <rect x="30" y="118" width="156" height="64" rx="9" fill="#eef4ff" stroke="#3b5bdb" stroke-width="1.5"/>
    <text x="108" y="144" text-anchor="middle" font-size="14.5" font-weight="650" fill="#1e3a8a">Capture</text>
    <text x="108" y="163" text-anchor="middle" font-size="11.5" fill="#3b4a66">4 seams · recording</text>
    <text x="108" y="177" text-anchor="middle" font-size="11.5" fill="#3b4a66">proxy + bus tap</text>
  </g>

  <!-- 2. Trace store -->
  <g>
    <rect x="232" y="116" width="160" height="68" rx="9" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
    <text x="312" y="141" text-anchor="middle" font-size="14.5" font-weight="650" fill="#7c2d12">Trace store</text>
    <text x="312" y="160" text-anchor="middle" font-size="11.5" fill="#8a4b2a">events.jsonl + blobs</text>
    <text x="312" y="174" text-anchor="middle" font-size="11.5" fill="#8a4b2a">JSON + safetensors · no pickle</text>
  </g>

  <!-- 3a. Faithful replay -->
  <g>
    <rect x="440" y="82" width="196" height="52" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="538" y="105" text-anchor="middle" font-size="13.5" font-weight="650" fill="#065f46">Faithful replay</text>
    <text x="538" y="122" text-anchor="middle" font-size="11.5" fill="#12775b">reproduce the exact run</text>
  </g>

  <!-- 3b. Counterfactual replay -->
  <g>
    <rect x="440" y="214" width="196" height="52" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="538" y="237" text-anchor="middle" font-size="13.5" font-weight="650" fill="#065f46">Counterfactual replay</text>
    <text x="538" y="254" text-anchor="middle" font-size="11.5" fill="#12775b">swap one seam · halt on divergence</text>
  </g>

  <!-- 4. Outputs -->
  <g>
    <rect x="690" y="72" width="182" height="48" rx="9" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="781" y="92" text-anchor="middle" font-size="13" font-weight="650" fill="#4c1d95">Reproduce &amp; diff</text>
    <text x="781" y="108" text-anchor="middle" font-size="11" fill="#5b3aa6">re-drive · compare two runs</text>

    <rect x="690" y="164" width="182" height="48" rx="9" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="781" y="184" text-anchor="middle" font-size="13" font-weight="650" fill="#4c1d95">Regression gate</text>
    <text x="781" y="200" text-anchor="middle" font-size="11" fill="#5b3aa6">fail CI on behavioral drift</text>

    <rect x="690" y="256" width="182" height="48" rx="9" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="781" y="276" text-anchor="middle" font-size="13" font-weight="650" fill="#4c1d95">Fidelity metrics</text>
    <text x="781" y="292" text-anchor="middle" font-size="11" fill="#5b3aa6">info loss vs a noise floor</text>
  </g>
</svg>
